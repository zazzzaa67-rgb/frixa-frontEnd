<!DOCTYPE html>
<html lang="en">
<head>
    <title>Requirements | Forixa</title>
    <meta name="description"
        content="Provide your project requirements, budget, timeline, and business goals so FORIXA can deliver a tailored solution for your needs.">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ##### FONT awesome #### -->
    <link rel="stylesheet" href="css/details.css">

<body>
    <header></header>
    <main>
        <section id="requirements">
            <h1>Project<span class="red head"> Requirements</span></h1>
            <p>Tell us about your project so we can understand your needs better.</p>
            <div class="con">
                <span class="step0 dot">1</span>
                <p>Project Overview</p>
            </div>
            <div class="con">
                <span class="step1 dot">2</span>
                <p>Project Requirements</p>
            </div>
            <div class="con">
                <span class="step2 dot">3</span>
                <p>Contact & Submit</p>
            </div>
            
            
        </section>
        <section id="projectInfo">
            <form id="projectForm">
            </form>
        </section>
    </main>
    <script src="js/details.js" type="module"></script> 
</body>
</html>
